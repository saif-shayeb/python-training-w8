{% extends "base.html" %}

{% block content %}
<div class="auth-container glass-card mx-auto" style="max-width: 400px;">
    <h2>Create Account</h2>
    
    <form id="registerForm" class="auth-form mt-4">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="reg-username" required>
        </div>
        <div class="input-group mt-3">
            <label>Password</label>
            <input type="password" id="reg-password" required>
        </div>
        <div class="input-group mt-3">
            <label>Email</label>
            <input type="email" id="reg-email" required>
        </div>
        <div class="input-group mt-3">
            <label>Account Role</label>
            <select id="reg-role">
                <option value="student">Student</option>
                <option value="instructor">Instructor</option>
                <option value="admin">Administrator</option>
            </select>
        </div>
        
        <!-- Only shown if student/instructor -->
        <div id="student-extras" class="mt-3">
            <div class="input-group">
                <label id="name-label">Full Legal Name</label>
                <input type="text" id="reg-name">
            </div>
            <div id="gpa-group" class="input-group mt-3">
                <label>Starting GPA</label>
                <input type="number" step="0.1" id="reg-gpa" value="0.0">
            </div>
            <div id="major-group" class="input-group mt-3" style="display:none;">
                <label>Department / Major</label>
                <input type="text" id="reg-major">
            </div>
        </div>

        <button type="submit" class="btn primary mt-4 w-full">Register Account</button>
        <div id="regError" class="error-msg mt-2"></div>
    </form>
</div>
<script>
    document.getElementById('reg-role').addEventListener('change', (e) => {
        const wrap = document.getElementById('student-extras');
        const gpaGroup = document.getElementById('gpa-group');
        const majorGroup = document.getElementById('major-group');
        const nameLabel = document.getElementById('name-label');
        
        const role = e.target.value;
        wrap.style.display = (role === 'student' || role === 'instructor') ? 'block' : 'none';
        
        if (role === 'student') {
            gpaGroup.style.display = 'block';
            majorGroup.style.display = 'none';
            nameLabel.innerText = 'Full Legal Name';
        } else if (role === 'instructor') {
            gpaGroup.style.display = 'none';
            majorGroup.style.display = 'block';
            nameLabel.innerText = 'Instructor Full Name';
        }
    });
</script>
{% endblock %}
