{% extends "public/base_public.html" %}

{% block title %}Sign Up - EduSpace{% endblock %}

{% block content %}
<div class="auth-card" style="max-width: 500px;">
    <div class="auth-header">
        <h1>Create Account</h1>
        <p>Join the EduSpace academic platform</p>
    </div>

    <form id="register-form">
        <div class="stats-grid" style="gap: 16px; margin-bottom: 16px;">
            <div class="form-group mb-0">
                <label class="form-label">Username</label>
                <input type="text" id="reg-username" class="form-control" required>
            </div>
            <div class="form-group mb-0">
                <label class="form-label">Email</label>
                <input type="email" id="reg-email" class="form-control" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="reg-password" class="form-control" required>
        </div>

        <div class="form-group">
            <label class="form-label">Account Role</label>
            <select id="reg-role" class="form-control">
                <option value="student">Student</option>
                <option value="instructor">Instructor</option>
                <option value="admin">Administrator</option>
            </select>
        </div>

        <!-- Role-specific fields -->
        <div id="role-extras" class="card" style="margin-bottom: 16px;">
            <div class="card-body" style="padding: 16px; background: #f9fafb;">
                <div class="form-group">
                    <label class="form-label" id="name-label">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="Required for Students & Instructors">
                </div>
                
                <div class="form-group mb-0" id="gpa-group">
                    <label class="form-label">Starting GPA</label>
                    <input type="number" step="0.1" id="reg-gpa" class="form-control" value="0.0">
                </div>

                <div class="form-group mb-0" id="major-group" style="display: none;">
                    <label class="form-label">Department / Major</label>
                    <input type="text" id="reg-major" class="form-control" placeholder="e.g. Computer Science">
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-full mt-2" id="reg-btn">
            Register Account
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    const roleSelect = document.getElementById('reg-role');
    const roleExtras = document.getElementById('role-extras');
    const gpaGroup = document.getElementById('gpa-group');
    const majorGroup = document.getElementById('major-group');
    const nameLabel = document.getElementById('name-label');

    roleSelect.addEventListener('change', (e) => {
        const role = e.target.value;
        if (role === 'admin') {
            roleExtras.style.display = 'none';
        } else {
            roleExtras.style.display = 'block';
            if (role === 'student') {
                gpaGroup.style.display = 'block';
                majorGroup.style.display = 'none';
                nameLabel.innerText = 'Student Full Name';
            } else if (role === 'instructor') {
                gpaGroup.style.display = 'none';
                majorGroup.style.display = 'block';
                nameLabel.innerText = 'Instructor Full Name';
            }
        }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('reg-username').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const role = roleSelect.value;

        // Basic Validation
        if (username.length < 3) {
            UI.toast('Username must be at least 3 characters long', 'error');
            btn.disabled = false;
            btn.innerText = 'Register Account';
            return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            UI.toast('Please enter a valid email address', 'error');
            btn.disabled = false;
            btn.innerText = 'Register Account';
            return;
        }

        if (password.length < 6) {
            UI.toast('Password must be at least 6 characters long', 'error');
            btn.disabled = false;
            btn.innerText = 'Register Account';
            return;
        }

        const payload = { username, password, email, role };

        if (role !== 'admin') {
            const name = document.getElementById('reg-name').value.trim();
            if (!name) {
                UI.toast('Full Name is required for this role', 'error');
                btn.disabled = false;
                btn.innerText = 'Register Account';
                return;
            }
            payload.name = name;
            
            if (role === 'student') {
                const gpa = parseFloat(document.getElementById('reg-gpa').value || 0);
                if (isNaN(gpa) || gpa < 0 || gpa > 4.0) {
                    UI.toast('GPA must be a number between 0.0 and 4.0', 'error');
                    btn.disabled = false;
                    btn.innerText = 'Register Account';
                    return;
                }
                payload.gpa = gpa;
            } else if (role === 'instructor') {
                const major = document.getElementById('reg-major').value.trim();
                if (!major) {
                    UI.toast('Department / Major is required for instructors', 'error');
                    btn.disabled = false;
                    btn.innerText = 'Register Account';
                    return;
                }
                payload.major = major;
            }
        }

        try {
            await Api.fetch('/auth/register', { method: 'POST', body: JSON.stringify(payload) });
            UI.toast('Account created successfully! Please login.', 'success');
            setTimeout(() => window.location.href = '/login', 1500);
        } catch (err) {
            UI.toast(err.message, 'error');
            btn.disabled = false;
            btn.innerText = 'Register Account';
        }
    });

    // Trigger initial state
    roleSelect.dispatchEvent(new Event('change'));
</script>
{% endblock %}
