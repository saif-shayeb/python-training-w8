{% extends "public/base_public.html" %}

{% block title %}Sign In - EduSpace{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to your EduSpace account</p>
    </div>

    <form id="login-form">
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" required placeholder="Enter your username">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary w-full mt-2" id="login-btn">
            Sign In <i class="fas fa-arrow-right"></i>
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.innerHTML = 'Signing In...';

    const payload = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };

    try {
        const data = await Api.fetch('/auth/login', {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        
        localStorage.setItem('jwt_token', data.access_token);
        localStorage.setItem('user_role', data.user.role);
        
        let display_name = data.user.username;
        if (data.student) display_name = data.student.name;
        else if (data.instructor) display_name = data.instructor.name;

        localStorage.setItem('username', display_name);
        if (data.user.profile_pic_url) {
            localStorage.setItem('profile_pic_url', data.user.profile_pic_url);
        }
        
        UI.toast('Login successful!', 'success');
        setTimeout(() => {
            window.location.href = `/${data.user.role}/dashboard`;
        }, 500);
    } catch (err) {
        UI.toast(err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = 'Sign In <i class="fas fa-arrow-right"></i>';
    }
});
</script>
{% endblock %}
