{% extends "base.html" %}

{% block title %}Courses - EduSpace{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Academic Catalog</h2>
    <p>Browse our various course offerings</p>
</div>

<div class="glass-card mb-4">
    <div class="flex gap-3">
        <input type="text" id="course-search" placeholder="Filter courses by name..." class="w-full">
        <button onclick="loadCoursesList(1)" class="btn primary">Search</button>
    </div>
</div>

<div class="glass-card">
    <div class="card-header">
        <h3>Available Courses</h3>
        <span class="badge" id="course-total-count">0 Total</span>
    </div>
    <ul id="courses-list-view" class="data-list">
        <li class="empty-state">Loading curricular data...</li>
    </ul>
    
    <div id="course-pagination" class="pagination-container mt-4">
        <!-- Pagination injected here -->
    </div>
</div>
{% endblock %}
