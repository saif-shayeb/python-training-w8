{% extends "base.html" %}
{% block title %}Create Academic Account - EduSpace{% endblock %}
{% block page_title %}Administrative User Creation{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <div class="card-title">New User Account Details</div>
    </div>
    <div class="card-body">
        <form id="admin-user-form">
            <div class="stats-grid" style="gap: 16px; margin-bottom: 24px;">
                <div class="form-group mb-0">
                    <label class="form-label">Username</label>
                    <input type="text" id="add-username" class="form-control" required placeholder="User unique ID">
                </div>
                <div class="form-group mb-0">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="add-email" class="form-control" required placeholder="name@university.edu">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Initial Password</label>
                <input type="password" id="add-password" class="form-control" required placeholder="System default...">
            </div>

            <div class="form-group">
                <label class="form-label">Account Role</label>
                <select id="add-role" class="form-control" required>
                    <option value="student">Student</option>
                    <option value="instructor">Instructor</option>
                </select>
            </div>

            <!-- Role-specific extra fields -->
            <div id="role-fields" style="background: #f9fafb; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); margin-top: 24px;">
                <div class="form-group">
                    <label class="form-label" id="field-name-label">Student Full Name</label>
                    <input type="text" id="add-name" class="form-control" required>
                </div>
                
                <div id="student-only" class="form-group mb-0">
                    <label class="form-label">Current GPA (0.0 - 4.0)</label>
                    <input type="number" step="0.1" id="add-gpa" class="form-control" value="0.0" min="0" max="4">
                </div>

                <div id="instructor-only" class="form-group mb-0" style="display: none;">
                    <label class="form-label">Academic Department</label>
                    <input type="text" id="add-major" class="form-control" placeholder="e.g., Computer Science">
                </div>
            </div>

            <div class="flex gap-4 mt-4">
                <button type="submit" class="btn btn-primary w-full" id="submit-btn">
                    <i class="fas fa-user-plus"></i> Finalize Account Profile
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    if (Auth.guard(['admin'])) {
        const roleSelect = document.getElementById('add-role');
        const nameLabel = document.getElementById('field-name-label');
        const studentOnly = document.getElementById('student-only');
        const instructorOnly = document.getElementById('instructor-only');

        roleSelect.addEventListener('change', (e) => {
            const role = e.target.value;
            if (role === 'student') {
                nameLabel.innerText = 'Student Full Name';
                studentOnly.style.display = 'block';
                instructorOnly.style.display = 'none';
            } else {
                nameLabel.innerText = 'Instructor Full Name';
                studentOnly.style.display = 'none';
                instructorOnly.style.display = 'block';
            }
        });

        document.getElementById('admin-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            const username = document.getElementById('add-username').value.trim();
            const email = document.getElementById('add-email').value.trim();
            const password = document.getElementById('add-password').value;
            const role = roleSelect.value;
            const name = document.getElementById('add-name').value.trim();

            if (username.length < 3) {
                UI.toast('Username must be at least 3 characters', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Finalize Account Profile';
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                UI.toast('Please enter a valid email', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Finalize Account Profile';
                return;
            }

            if (password.length < 6) {
                UI.toast('Password must be at least 6 characters', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Finalize Account Profile';
                return;
            }

            if (!name) {
                UI.toast('Full Name is required', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Finalize Account Profile';
                return;
            }

            const payload = { username, email, password, role, name };

            if (payload.role === 'student') {
                const gpa = parseFloat(document.getElementById('add-gpa').value);
                if (isNaN(gpa) || gpa < 0 || gpa > 4.0) {
                    UI.toast('GPA must be between 0.0 and 4.0', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Finalize Account Profile';
                    return;
                }
                payload.gpa = gpa;
            } else {
                const major = document.getElementById('add-major').value.trim();
                if (!major) {
                    UI.toast('Department is required for instructors', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Finalize Account Profile';
                    return;
                }
                payload.major = major;
            }

            try {
                await Api.fetch('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                UI.toast(`New ${payload.role} record created successfully!`, 'success');
                e.target.reset(); // Clear form
                roleSelect.dispatchEvent(new Event('change')); // Reset UI state
            } catch (err) {
                UI.toast(err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Finalize Account Profile';
            }
        });
    }
</script>
{% endblock %}
